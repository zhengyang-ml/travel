<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>湘行记 | 湖南全域旅游攻略</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="hero-kicker">HUNAN TRAVEL NOTEBOOK</p>
      <h1>湘行记 · 湖南各市深度旅游攻略</h1>
      <p class="hero-subtitle">
        覆盖湖南 13 个地级市 + 湘西州，一页查看最佳季节、经典线路、预算、美食与避坑建议。
      </p>
      <div class="hero-controls">
        <label class="search-wrap" for="searchInput">
          <span>搜索城市或关键词</span>
          <input id="searchInput" type="search" placeholder="例如：张家界 / 红色旅游 / 温泉" />
        </label>
        <div class="filter-wrap" id="tagFilters">
          <button type="button" class="tag-btn active" data-tag="all">全部</button>
          <button type="button" class="tag-btn" data-tag="nature">山水风光</button>
          <button type="button" class="tag-btn" data-tag="culture">历史人文</button>
          <button type="button" class="tag-btn" data-tag="food">美食烟火</button>
          <button type="button" class="tag-btn" data-tag="red">红色旅游</button>
          <button type="button" class="tag-btn" data-tag="family">亲子休闲</button>
        </div>
      </div>
    </header>

    <main class="content">
      <aside class="city-panel">
        <div class="panel-title-row">
          <h2>城市索引</h2>
          <p id="cityCount"></p>
        </div>
        <div id="cityList" class="city-list" aria-label="城市列表"></div>
      </aside>

      <section id="cityDetail" class="detail-panel" aria-live="polite"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
